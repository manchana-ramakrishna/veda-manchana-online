name: Deploy veda.manchana.online

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Sync to S3
        env:
          BUCKET: ${{ vars.S3_BUCKET }}
        run: |
          if [ -z "$BUCKET" ]; then
            echo "Set repository variable S3_BUCKET (e.g. veda.manchana.online)"
            exit 1
          fi
          aws s3 sync . "s3://$BUCKET" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "README.md" \
            --exclude ".gitignore" \
            --cache-control "max-age=60"

      - name: Invalidate CloudFront
        env:
          DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -z "$DISTRIBUTION_ID" ]; then
            echo "Set repository variable CLOUDFRONT_DISTRIBUTION_ID to invalidate cache"
            exit 0
          fi
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"
